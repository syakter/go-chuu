version: '3.8'

services:
  go-chuu:
    build: .
    container_name: go-chuu-bot
    restart: unless-stopped
    environment:
      # Load from .env file
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_CHANNEL_ID=${SLACK_CHANNEL_ID:-C0392543PUY}
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_API_SECRET=${LASTFM_API_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PORT=${PORT:-8080}
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT:-30s}
      - MAX_CONCURRENT_REQUESTS=${MAX_CONCURRENT_REQUESTS:-10}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL=${CACHE_TTL:-5m}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30s}
      - USERS=${USERS:-}
    volumes:
      # Mount temp directory for chart generation
      - /tmp/go-chuu-charts:/tmp/go-chuu-charts
    networks:
      - go-chuu-network
    # Optional: expose port for health checks or metrics
    ports:
      - "${PORT:-8080}:8080"
    
    # Health check
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "'[g]o-chuu'", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

networks:
  go-chuu-network:
    driver: bridge

